name = "notejet-backend"
main = "src/index.js"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Keep the workers.dev URL enabled alongside the custom domain
workers_dev = true

# Custom domain for the Worker API (auto-creates DNS + cert on Cloudflare)
routes = [
  { pattern = "api.notejet.app", custom_domain = true }
]

# Set your secret with:  wrangler secret put ANTHROPIC_API_KEY
# For local dev, put it in backend/.dev.vars instead (see .dev.vars.example).

# Non-secret config (committed). Secrets (ANTHROPIC_API_KEY, AUTH_SECRET,
# STRIPE_*, RESEND_*) go via `wrangler secret put`, never here.
[vars]
ALLOWED_ORIGINS = "https://notejet.app,https://www.notejet.app,https://notejet.pages.dev,https://bubbleduck10.github.io,http://localhost:5173"
APP_URL = "https://notejet.app"
EMAIL_FROM = "NoteJet <login@notejet.app>"
STRIPE_PRICE_PRO_MONTHLY = "price_1Tnnc5LAJpsQIbIMLIQM8Lob"
STRIPE_PRICE_PRO_6MO = "price_1Tnnc5LAJpsQIbIMDtIon35X"
STRIPE_PRICE_PRO_ANNUAL = "price_1Tnnc5LAJpsQIbIMrExBShFr"
STRIPE_PRICE_PACK_100 = "price_1Tnnc6LAJpsQIbIMeNMnEukN"
STRIPE_PRICE_PACK_300 = "price_1Tnnc6LAJpsQIbIMmAvlZYsC"

# Credits datastore. Create it once with:  wrangler d1 create studymate
# then paste the printed database_id below.
[[d1_databases]]
binding = "DB"
database_name = "studymate"
database_id = "aeec091a-fa08-486c-8a60-6a001f7f2af8"
